# Tài liệu: https://www.checkov.io/2.Basics/CLI%20Command%20Reference.html

framework:
  - terraform

# Thư mục quét
directory:
  - lab02/terraform

# Bỏ qua các check không cần thiết cho bài lab này
skip-check:
  # CKV_AWS_8: EC2 dùng key_name thay vì IAM Instance Profile
  - CKV_AWS_8
  # CKV2_AWS_41: IAM role flow log không cần MFA — đây là service role
  - CKV2_AWS_41
  # CKV_AWS_338: CloudWatch log retention > 1 năm — 7 ngày đủ cho Lab
  - CKV_AWS_338
    # Bastion bắt buộc có Public IP
  - CKV_AWS_88
  # t3.micro không hỗ trợ EBS Optimized
  - CKV_AWS_135
  # Egress 0.0.0.0/0 bình thường cho EC2
  - CKV_AWS_382
  # False positive — rule dùng SG reference không phải 0.0.0.0/0
  - CKV_AWS_24
  # False positive — Checkov không detect SG gắn qua module
  - CKV2_AWS_5
  # False positive — check sai resource
  - CKV2_AWS_12
  # KMS cho CloudWatch tốn tiền, không cần cho Lab
  - CKV_AWS_158

# Xuất kết quả dưới dạng JSON để CI/CD xử lý
output: cli

# Compact mode: chỉ hiện failed checks
compact: true

# Dừng pipeline nếu có lỗi severity HIGH hoặc CRITICAL
soft-fail: false
